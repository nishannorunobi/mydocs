worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile     on;
    client_max_body_size 100M;

    server {
        listen 80;
        server_name _;

        # Docker's internal DNS resolver — re-resolves container IPs on restart
        resolver 127.0.0.11 valid=10s ipv6=off;

        set $api      plane-api:8000;
        set $frontend plane-web:3000;
        set $admin    plane-admin:3000;

        # God-mode admin panel + its static assets
        location /god-mode/ {
            proxy_pass http://$admin;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Django API + auth + S3 proxy + SSO
        location ~ ^/(api|auth|s3|sso)/ {
            proxy_pass http://$api;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout    300s;
        }

        # Django static files
        location /static/ {
            proxy_pass http://$api;
            proxy_set_header Host $host;
        }

        # Everything else → Next.js frontend (handles its own /_next/static/)
        location / {
            proxy_pass http://$frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host       $host;
            proxy_cache_bypass          $http_upgrade;
        }
    }
}
